<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smilodon Styling Examples — Bootstrap</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <style>
    enhanced-select.bootstrap-demo {
      --select-input-border: 1px solid #ced4da;
      --select-input-border-radius: 0.375rem;
      --select-input-focus-border: #86b7fe;
      --select-shadow-focus: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      --select-option-hover-bg: #e9ecef;
      --select-option-selected-bg: #0d6efd;
      --select-option-selected-color: #ffffff;
      --select-badge-bg: #0d6efd;
    }

    enhanced-select.bootstrap-demo::part(button) {
      min-height: calc(1.5em + 0.75rem + 2px);
    }

    enhanced-select.bootstrap-demo::part(listbox) {
      border-radius: 0.5rem;
    }
  </style>
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h3 mb-3">Smilodon + Bootstrap</h1>
            <p class="text-body-secondary">
              Bootstrap handles page layout and spacing. Smilodon consumes Bootstrap palette values through CSS variables and shadow parts.
            </p>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="bootstrap-select">Framework</label>
              <enhanced-select id="bootstrap-select" class="bootstrap-demo d-block w-100"></enhanced-select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import '../../packages/core/dist/index.js';

    const select = document.getElementById('bootstrap-select');

    select.setItems([
      { value: 'bootstrap', label: 'Bootstrap' },
      { value: 'tailwind', label: 'Tailwind CSS' },
      { value: 'mui', label: 'Material UI' },
      { value: 'css', label: 'Raw CSS' },
    ]);

    select.setAttribute('searchable', '');
    select.setAttribute('clearable', '');
  </script>
</body>
</html>
