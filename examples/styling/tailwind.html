<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smilodon Styling Examples — Tailwind CSS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .smilodon-tailwind {
      --select-input-border: 1px solid rgb(229 231 235);
      --select-input-border-radius: 0.75rem;
      --select-input-focus-border: rgb(59 130 246);
      --select-shadow-focus: 0 0 0 3px rgb(59 130 246 / 0.18);
      --select-option-selected-bg: rgb(219 234 254);
      --select-option-selected-color: rgb(30 64 175);
      --select-badge-bg: linear-gradient(135deg, rgb(59 130 246) 0%, rgb(37 99 235) 100%);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen max-w-4xl items-center justify-center px-6 py-12">
    <section class="w-full rounded-3xl border border-slate-800 bg-slate-900/80 p-8 shadow-2xl shadow-slate-950/40 backdrop-blur">
      <div class="mb-6">
        <p class="text-sm font-medium uppercase tracking-[0.22em] text-blue-300">Browser styling demo</p>
        <h1 class="mt-2 text-3xl font-semibold tracking-tight">Smilodon + Tailwind CSS</h1>
        <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-300">
          Tailwind utilities style the page and Smilodon maps stateful option styling through <code>classMap</code>.
        </p>
      </div>

      <enhanced-select id="tailwind-select" class="smilodon-tailwind block w-full"></enhanced-select>
    </section>
  </main>

  <script type="module">
    import '../../packages/core/dist/index.js';

    const select = document.getElementById('tailwind-select');

    select.classMap = {
      selected: 'bg-blue-600 text-white font-semibold',
      active: 'bg-blue-50 text-slate-900 ring-2 ring-blue-200',
      disabled: 'opacity-50 cursor-not-allowed'
    };

    select.setItems([
      { value: 'tailwind', label: 'Tailwind CSS' },
      { value: 'bootstrap', label: 'Bootstrap' },
      { value: 'mui', label: 'Material UI' },
      { value: 'css', label: 'Raw CSS' },
      { value: 'disabled', label: 'Disabled example', disabled: true },
    ]);

    select.setAttribute('searchable', '');
    select.setAttribute('clearable', '');
  </script>
</body>
</html>
